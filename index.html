<!DOCTYPE html>
<html>
<head>
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="nav-left">
            <img src="assets/logo.png" class="logo">
        </div>

        <div class="nav-center">
            <input type="text" placeholder="Search for products, brands and more">
        </div>

        <div class="nav-right">
            <button class="login-btn">Login</button>
            <p class="more">More</p>
            <p class="cart">Cart 🛒</p>
        </div>
    </div>

    <!-- CATEGORIES -->
    <div class="categories">
        <div class="cat">Mobiles</div>
        <div class="cat">Fashion</div>
        <div class="cat">Electronics</div>
        <div class="cat">Home</div>
        <div class="cat">Appliances</div>
        <div class="cat">Travel</div>
        <div class="cat">Beauty</div>
    </div>

    <!-- BANNER -->
    <div class="banner">
        <img src="assets/banner.jpg">
    </div>

    <!-- PRODUCTS -->
    <h2 class="section-title">Best Deals</h2>

    <div class="products">

        <div class="card">
            <img src="assets/product1.jpg">
            <h3>Smartphone</h3>
            <p class="price">₹15,000</p>
        </div>

        <div class="card">
            <img src="assets/product2.jpg">
            <h3>Laptop</h3>
            <p class="price">₹25,000</p>
        </div>

        <div class="card">
            <img src="assets/product3.jpg">
            <h3>Shoes</h3>
            <p class="price">₹35,000</p>
        </div>

    </div>

</body>
</html>
